<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Window frame -->
  <rect x="2" y="4" width="28" height="24" rx="3" ry="3"
        fill="#2d6a9f" stroke="#1a4f7a" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="2" y="4" width="28" height="7" rx="3" ry="3"
        fill="#1a4f7a"/>
  <rect x="2" y="8" width="28" height="3"
        fill="#1a4f7a"/>
  <!-- Title bar buttons -->
  <circle cx="7"  cy="7.5" r="1.8" fill="#e74c3c"/>
  <circle cx="12" cy="7.5" r="1.8" fill="#f39c12"/>
  <circle cx="17" cy="7.5" r="1.8" fill="#2ecc71"/>
  <!-- Window body -->
  <rect x="2" y="11" width="28" height="17" rx="0" ry="0"
        fill="#ecf4fb"/>
  <rect x="2" y="25" width="28" height="3" rx="0" ry="0"
        fill="#ecf4fb"/>
  <rect x="2" y="25" width="28" height="3" rx="3" ry="3"
        fill="#ecf4fb"/>
  <!-- Question mark -->
  <text x="16" y="26" font-family="Georgia, serif" font-size="16"
        font-weight="bold" fill="#2d6a9f"
        text-anchor="middle">?</text>
</svg>
